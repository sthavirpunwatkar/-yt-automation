name: Slideshow Type Automation
on:
  schedule:
    # Match Window 1: ~12:00 PM EDT -> 12:30 PM EDT (16:30 UTC)
    - cron: "30 16 * * *"
    # Match Window 2: ~3:00 PM EDT -> 3:30 PM EDT (19:30 UTC)
    - cron: "30 19 * * *"
    # Match Window 3: ~7:00 PM EDT -> 7:30 PM EDT (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel preset (fifa_2026 or football)"
        required: false
        default: "fifa_2026"
      topic:
        description: "Optional topic override (leave empty for auto-selection)"
        required: false
        default: ""
      image_urls:
        description: "Comma-separated list of manual image URLs"
        required: false
        default: ""
        type: string

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
  EDGE_TTS_VOICE: "en-US-GuyNeural"

jobs:
  build-slideshow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:         
          python-version: '3.11'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Slideshow Engine
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'fifa_2026' }}"
          TOPIC="${{ github.event.inputs.topic || '' }}"
          IMAGE_URLS="${{ github.event.inputs.image_urls || '' }}"
          if [ -n "$TOPIC" ]; then
            if [ -n "$IMAGE_URLS" ]; then
              python scripts/run_slideshow.py --channel "$CHANNEL" --topic "$TOPIC" --upload --privacy public --image-urls "$IMAGE_URLS"
            else
              python scripts/run_slideshow.py --channel "$CHANNEL" --topic "$TOPIC" --upload --privacy public
            fi
          else
            if [ -n "$IMAGE_URLS" ]; then
              python scripts/run_slideshow.py --channel "$CHANNEL" --upload --privacy public --image-urls "$IMAGE_URLS"
            else
              python scripts/run_slideshow.py --channel "$CHANNEL" --upload --privacy public
            fi
          fi
